# ── Backgrounds ─────────────────────────────
set $bg              #0b1021
set $bg_alt          #11162a
set $bg_trans        #0b1021e6
# ── Primary Accents ─────────────────────────
set $blue            #7aa2f7
set $cyan            #5fd7ff
set $purple          #bb9af7 
set $teal            #88c0d0
set $green           #9ece6a
# ── Alerts & States ─────────────────────────
set $urgent          #f7768e
set $warning         #e0af68
set $success         #4ade80
# ── Text & Greys ────────────────────────────
set $fg              #c0caf5
set $white           #ffffff
set $grey_light      #a9b1d6
set $grey            #7f85a3
set $grey_dark       #414868
set $black           #020617

# ── Window Border Colors ────────────────────
#class                  border      bground    text         indicator    child_border
client.focused          $cyan       $bg        $white       $cyan        $cyan
client.focused_inactive $grey       $bg_alt    $grey_light  $grey        $grey
client.unfocused        $grey_dark  $bg        $grey        $grey_dark   $grey_dark
client.urgent           $urgent     $bg        $white       $urgent      $urgent

# ── Border Settings ─────────────────────────
default_border pixel 2
default_floating_border pixel 2

############################################
# bar settings (input comes from i3blocks) #
############################################
bar {
        font pango: 0xProto Nerd Font Regular 10
        status_command i3status-rs /home/macho25/.config/i3status-rust/config.toml
        position top
        tray_padding 0
        strip_workspace_numbers yes
        colors {
            separator          $purple
            background         $bg_alt
            statusline         $fg
            focused_workspace  $cyan     $bg        $white
            active_workspace   $teal     $bg_alt    $fg
            inactive_workspace $bg_alt   $bg_alt    $grey
            urgent_workspace   $urgent   $urgent    $white
        }
}
