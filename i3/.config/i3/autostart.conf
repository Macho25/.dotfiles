# make sure it loads gtk configs
exec_always $HOME/.config/i3/scripts/import-gsettings

## compositor
# exec_always --no-startup-id ~/.xprofile
exec_always --no-startup-id picom --config  ~/.config/picom/picom.conf &

#get auth work with polkit-gnome
exec --no-startup-id /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# dex execute .desktop files + apps using /etc/xdg/autostart.
# when second to i3 a DE is installed or mixed usage of i3 + xfce4 or GNOME
# in this cases better disable dex and use manual starting apps using xdg/autostart
# if enabled you should comment welcome app.
# https://github.com/jceb/dex
#exec --no-startup-id dex -a -s /etc/xdg/autostart/:~/.config/autostart/
exec --no-startup-id dex --autostart --environment i3

# start welcome app
#exec --no-startup-id sh /usr/share/endeavouros/scripts/welcome --startdelay=3

# num lock activated
exec --no-startup-id numlockx on

# configure multiple keyboard layouts and hotkey to switch (Alt+CAPSLOCK in this example)
#exec --no-startup-id setxkbmap -layout 'us,sk' -variant altgr-intl,qwerty -option 'grp:alt_caps_toggle'

# start a script to setup displays
# uncomment the next line, use arandr to setup displays and save the file as monitor:
# exec --no-startup-id ~/.screenlayout/monitor

# set wallpaper
# exec --no-startup-id sleep 2 && nitrogen --restore
exec --no-startup-id sleep 1 && feh --bg-scale ~/Pictures/blue.jpg
# set powersavings for display:
exec --no-startup-id xset s 480 dpms 600 600 600

# xscreensaver
# https://www.jwz.org/xscreensaver
#exec --no-startup-id xscreensaver --no-splash

# Desktop notifications

# dunst config used ~/.config/dunst/dunstrc
# set alternative config if needed:
#exec --no-startup-id /usr/bin/dunst --config ~/.config/dunst/dunstrc
# may need to run dbus-launch explicitly:
#exec --no-startup-id dbus-launch /usr/bin/dunst
exec --no-startup-id /usr/bin/dunst
exec --no-startup-id redshift 

# Autostart apps as you like
exec --no-startup-id alacritty -e bash -lc 'sleep 2 && fastfetch --logo arch; exec bash'
exec --no-startup-id sleep 2 && firefox https://github.com/endeavouros-team/endeavouros-i3wm-setup/blob/main/force-knowledge.md
#exec --no-startup-id sleep 3 && thunar

#####################################
# Application menu handled by rofi: #
#####################################

## rofi bindings fancy application menu
bindsym $mod+d exec --no-startup-id rofi -modi drun -show drun \
        -config ~/.config/rofi/rofidmenu.rasi

## rofi bindings for window menu
bindsym $mod+t exec --no-startup-id rofi -show window \
        -config ~/.config/rofi/rofidmenu.rasi

## rofi bindings to manage clipboard (install rofi-greenclip from the AUR)
exec --no-startup-id greenclip daemon>/dev/null

bindsym $mod+e exec --no-startup-id rofi -modi "clipboard:greenclip print" -show clipboard \
       -config ~/.config/rofi/rofidmenu.rasi

# Fix Rapture COBRA Mouse (using Product ID to avoid 'multiple devices' error)
exec_always --no-startup-id sh -c 'sleep 1 && xinput set-prop "7511:64096" "libinput Accel Profile Enabled" 0 1 0'
exec_always --no-startup-id sh -c 'sleep 1 && xinput set-prop "7511:64096" "libinput Accel Speed" -1'
# Add this to ~/.config/i3/config
for_window [class="gamescope"] floating enable, border none, focus

# Create the 1080x1080 @ 120Hz mode
exec --no-startup-id xrandr --newmode "1080x1080_120"  197.75  1080 1160 1272 1472  1080 1083 1088 1122 -hsync +vsync

# Register the mode to your monitor
exec --no-startup-id xrandr --addmode DP-4 "1080x1080_120"

exec_always --no-startup-id ~/.config/i3/scripts/setup-monitors.sh

# exec_always --no-startup-id redshift -v 

